# Cloudflare Workers configuration for FEEDS validators
# You'll need to deploy 5 instances of this worker with different names

# Validator 1
[env.validator-1]
name = "feeds-validator-1"
main = "validator-template.ts"
compatibility_date = "2024-01-01"

# Cron trigger - runs every minute
[env.validator-1.triggers]
crons = ["* * * * *"]

[env.validator-1.vars]
ORACLE_REGISTRY_ADDRESS = "0xdd2B69f72832aBAD5DA333F6bC4Dd584c13ADD64"
RPC_URL = "https://base-rpc.publicnode.com"
API_BASE_URL = "https://feeds.review"

# Secrets (set via: wrangler secret put VALIDATOR_PRIVATE_KEY --env validator-1)
# VALIDATOR_PRIVATE_KEY
# GECKOTERMINAL_API_KEY (optional)
# OPENWEATHER_API_KEY (optional)
# NEYNAR_API_KEY (optional)

