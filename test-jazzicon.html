<!DOCTYPE html>
<html>
<head>
    <title>Jazzicon Test</title>
    <script type="module">
        // Test if jazzicon works standalone
        import jazzicon from 'https://esm.sh/@metamask/jazzicon@2.0.0';

        window.addEventListener('DOMContentLoaded', () => {
            const address = '0xc4f7822a9DeCB9d15aadBc079D2c052C229E24dB';
            const seed = parseInt(address.slice(2, 10), 16);
            const icon = jazzicon(32, seed);

            document.getElementById('test-container').appendChild(icon);
            console.log('Jazzicon created:', icon);
        });
    </script>
</head>
<body style="background: black; color: white; padding: 40px;">
    <h1>Jazzicon Test</h1>
    <p>If you see a colorful circle below, jazzicon works:</p>
    <div id="test-container" style="margin: 20px 0;"></div>
    <p>Check browser console for errors.</p>
</body>
</html>
